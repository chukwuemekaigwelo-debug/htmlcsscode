     <form action="">

<input type="text">

</select>

<!-- buton= to submit or reset the form -->
<button type="submit"> submit</button>

<!-- label= provides a caption for an item in a user interface -->
<label for=""></label>

<!-- textatrea=  multiline text input control -->
<textarea name="" id="" cols="30" rows="10"></textarea>

<!-- fieldset = group related in a form -->
<fieldset >
    <legend>PERSONAL INFORMATION</legend>

</fieldset>
