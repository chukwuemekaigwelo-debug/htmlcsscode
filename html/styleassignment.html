<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <link rel="stylesheet" href="/css/styleassignment.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <img src="/img/lady.jpg.jpeg" alt="logo">
        </div>

        <ul class="menu">
            <li>HOME</li>
            <li>ABOUT</li>
            <li>SERVICES</li>
            <li>BLOG</li>
            <li>MORE</li>
        </ul>

        <button class="contact-btn">CONTACT</button>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-image">
            <img src="/img/lady.jpg.jpeg" alt="profile">
        </div>

        <div class="hero-text">
            <h4>CODEWITHRANDOM</h4>
            <h1>I'm a Web <span>Developer</span></h1>
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Doloremque illum nam nobis, minima laudantium fugit.
            </p>
            <button class="cv-btn">DOWNLOAD CV</button>
        </div>
    </section>

</body>
</html>
